  <body>
    <div class="container">
      <!-- ABOUT SECTION -->
      <header class="section section-about">
        <img
          src="https://github.com/deniss87.png"
          alt="Deniss Patancevs"
          class="avatar"
          loading="lazy"
        />
        <h1>Hi there, I'm Deniss Patancevs</h1>

        <p>
          Junior Full-Stack Web Developer focused on modern web technologies.
        </p>
      </header>

      <!-- TECH STACK SECTION -->
      <section class="section">
        <h2 class="section-title">🧰 My Tech Stack</h2>
        {{TECH_STACK}}
      </section>

      <!-- FEATURED PROJECTS SECTION -->
      <section class="section">
        <h2 class="section-title">⭐ Featured Projects</h2>
        <div class="featured-grid">{{FEATURED_PROJECTS}}</div>
      </section>

      <!-- PROJECTS SECTION -->
      <section class="section" id="projects-section">
        <h2 class="section-title">🚀 All Projects</h2>
        <div class="filter-container">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="js">JS</button>
          <button class="filter-btn" data-filter="react">
            React / Next.js
          </button>
          <button class="filter-btn" data-filter="php">PHP / Laravel</button>
          <button class="filter-btn" data-filter="rest">REST API</button>
        </div>
        <div class="projects-wrapper">
          <table>
            <thead>
              <tr>
                <th>Project</th>
                <th>Stack</th>
                <th>Links</th>
              </tr>
            </thead>
            <tbody id="projects-content">
              {{PROJECTS}}
            </tbody>
          </table>
        </div>
      </section>

      <!-- COURSES SECTION -->
      <section class="section">
        <h2 class="section-title">📚 Courses</h2>
        <table>
          <thead>
            <tr>
              <th>Course</th>
              <th>Description</th>
              <th>Links</th>
            </tr>
          </thead>
          <tbody id="courses-content">
            {{COURSES}}
          </tbody>
        </table>
      </section>

      <!-- CONTACT SECTION -->
      <section id="contact" class="section">
        <h2 class="section-title">📫 Contact</h2>
        <div class="contact-badges">
          <a href="mailto:deniss.patancevs@gmail.com" target="_blank">
            <img
              src="https://img.shields.io/badge/Email-D14836?logo=gmail&logoColor=white"
              alt="Email"
            />
          </a>
          <a href="https://linkedin.com/in/deniss-patancevs" target="_blank">
            <img
              src="https://img.shields.io/badge/LinkedIn-0077B5?logo=linkedin&logoColor=white"
              alt="LinkedIn"
            />
          </a>
          <a href="https://github.com/deniss87" target="_blank">
            <img
              src="https://img.shields.io/badge/GitHub-181717?logo=github&logoColor=white"
              alt="GitHub"
            />
          </a>
        </div>
      </section>
